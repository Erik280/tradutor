version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# TRADUTOR TÉCNICO — Stack Portainer (Swarm Mode com Traefik)
# Backend acessível em: tradutor.transformafuturo.com.br/api/v1/...
# Frontend acessível em: tradutor.transformafuturo.com.br
# GitHub: https://github.com/Erik280/tradutor
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─── BACKEND — FastAPI ─────────────────────────────────────────────────────
  backend:
    image: ghcr.io/erik280/tradutor-backend:main
    environment:
      SUPABASE_URL: "${SUPABASE_URL}"
      SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"
      ENVIRONMENT: "${ENVIRONMENT}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
    networks:
      - network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=1"
        # Rota /api/ e /health com prioridade ALTA (10) para o backend
        - "traefik.http.routers.tradutor_backend.rule=Host(`tradutor.transformafuturo.com.br`) && (PathPrefix(`/api`) || PathPrefix(`/health`) || PathPrefix(`/docs`) || PathPrefix(`/redoc`))"
        - "traefik.http.routers.tradutor_backend.priority=10"
        - "traefik.http.routers.tradutor_backend.entrypoints=websecure"
        - "traefik.http.routers.tradutor_backend.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.tradutor_backend.service=tradutor_backend"
        - "traefik.http.services.tradutor_backend.loadbalancer.server.port=8000"
        - "traefik.http.services.tradutor_backend.loadbalancer.passHostHeader=true"

  # ─── FRONTEND — Vite → Nginx ───────────────────────────────────────────────
  frontend:
    image: ghcr.io/erik280/tradutor-frontend:main
    depends_on:
      - backend
    networks:
      - network
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=1"
        # Rota padrão (tudo) com prioridade BAIXA (1) para o frontend
        - "traefik.http.routers.tradutor_frontend.rule=Host(`tradutor.transformafuturo.com.br`)"
        - "traefik.http.routers.tradutor_frontend.priority=1"
        - "traefik.http.routers.tradutor_frontend.entrypoints=websecure"
        - "traefik.http.routers.tradutor_frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.tradutor_frontend.service=tradutor_frontend"
        - "traefik.http.services.tradutor_frontend.loadbalancer.server.port=80"
        - "traefik.http.services.tradutor_frontend.loadbalancer.passHostHeader=true"

networks:
  network:
    external: true
    name: network
