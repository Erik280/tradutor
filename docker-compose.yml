version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# TRADUTOR TÉCNICO — Stack Portainer (Swarm Mode com Traefik)
# GitHub: https://github.com/Erik280/tradutor
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─── BACKEND — FastAPI ─────────────────────────────────────────────────────
  backend:
    image: ghcr.io/erik280/tradutor-backend:main
    environment:
      SUPABASE_URL: "https://cbrwpchzozvffenduzsu.supabase.co"
      SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNicndwY2h6b3p2ZmZlbmR1enN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzOTk3NTIsImV4cCI6MjA5NDk3NTc1Mn0.39XYA5yqlaPv19MuWcDxAxjf8E2q0lkaGzO_J0m-Gls"
      SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNicndwY2h6b3p2ZmZlbmR1enN1Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3OTM5OTc1MiwiZXhwIjoyMDk0OTc1NzUyfQ.2Esd_waIL6RBxBUtXeEYxTZLVKNLWaaydH2auX7dSa0"
      ENVIRONMENT: "production"
      ALLOWED_ORIGINS: "https://tradutor.transformafuturo.com.br,http://localhost:3000"
    networks:
      - network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=1"
        - "traefik.http.routers.tradutor_backend.rule=Host(`api.tradutor.transformafuturo.com.br`)"
        - "traefik.http.routers.tradutor_backend.entrypoints=websecure"
        - "traefik.http.routers.tradutor_backend.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.tradutor_backend.service=tradutor_backend"
        - "traefik.http.services.tradutor_backend.loadbalancer.server.port=8000"
        - "traefik.http.services.tradutor_backend.loadbalancer.passHostHeader=true"

  # ─── FRONTEND — Vite → Nginx ───────────────────────────────────────────────
  frontend:
    image: ghcr.io/erik280/tradutor-frontend:main
    depends_on:
      - backend
    networks:
      - network
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=1"
        - "traefik.http.routers.tradutor_frontend.rule=Host(`tradutor.transformafuturo.com.br`)"
        - "traefik.http.routers.tradutor_frontend.entrypoints=websecure"
        - "traefik.http.routers.tradutor_frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.tradutor_frontend.service=tradutor_frontend"
        - "traefik.http.services.tradutor_frontend.loadbalancer.server.port=80"
        - "traefik.http.services.tradutor_frontend.loadbalancer.passHostHeader=true"

networks:
  network:
    external: true
    name: network
