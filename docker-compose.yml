      SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNicndwY2h6b3p2ZmZlbmR1enN1Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3OTM5OTc1MiwiZXhwIjoyMDk0OTc1NzUyfQ.2Esd_waIL6RBxBUtXeEYxTZLVKNLWaaydH2auX7dSa0"
      ENVIRONMENT: "production"
      ALLOWED_ORIGINS: "https://tradutor.transformafuturo.com.br,http://localhost:3000"
    networks:
      - tradutor-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      restart_policy:
        condition: any
      labels:
        - "com.portainer.accesscontrol.teams=tradutor"

  # ─── FRONTEND — Vite → Nginx ───────────────────────────────────────────────
  frontend:
    image: ghcr.io/erik280/tradutor-frontend:main
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - tradutor-net
    deploy:
      restart_policy:
        condition: any
      labels:
        - "com.portainer.accesscontrol.teams=tradutor"

networks:
  tradutor-net:
    driver: overlay
